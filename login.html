<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giriş Yap</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111827;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:#1f2937;
    padding:30px;
    border-radius:10px;
    width:320px;
    color:white;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:6px;
}

button{
    width:100%;
    padding:12px;
    background:#22c55e;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

a{
    color:#60a5fa;
    text-decoration:none;
}
</style>

</head>

<body>

<div class="box">

<h2>Giriş Yap</h2>

<input type="email" placeholder="E-posta">

<input type="password" placeholder="Şifre">

<button>Giriş Yap</button>

<br><br>

<a href="register.html">Hesabın yok mu? Kayıt Ol</a>

</div>

</body>
</html>
